name: Refresh live price

# Tiny price-only updater: fetches the latest WTI front-month quote server-side and
# upserts price.json on the gh-pages branch via the GitHub contents API. No build,
# no full deploy — runs in ~20s. The dashboard fetches price.json same-origin, so the
# browser never depends on Yahoo CORS (Yahoo blocks cross-origin fetches).
#
# If a run can't get a quote (rate limit, outage) it exits cleanly and the previous
# price.json stays live; the client badges a tick as LIVE only while it's under 25 min
# old, keeps showing the price un-badged up to 3h, then falls back to the frozen
# data.json price.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: price-refresh
  cancel-in-progress: true

jobs:
  price:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch WTI quote and upsert price.json on gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json, time, urllib.request

          price = prev = None
          for host in ("query1", "query2"):
              url = f"https://{host}.finance.yahoo.com/v8/finance/chart/CL%3DF?interval=1d&range=1d"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      meta = json.load(r)["chart"]["result"][0]["meta"]
                  price = meta.get("regularMarketPrice")
                  prev = meta.get("previousClose") or meta.get("chartPreviousClose")
                  if price:
                      break
              except Exception as e:
                  print(f"{host} failed: {e}")
                  time.sleep(3)

          if not price:
              print("No quote this run — previous price.json stays live")
              raise SystemExit(0)

          payload = {
              "price": round(float(price), 2),
              "prev_close": round(float(prev), 2) if prev else None,
              "change_pct": round((float(price) / float(prev) - 1) * 100, 2) if prev else None,
              "fetched_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "source": "yahoo CL=F",
          }
          print(payload)
          with open("price.json", "w") as f:
              json.dump(payload, f)
          PY

          # Upsert via the contents API (create or update — needs the current SHA if it exists).
          if [ -f price.json ]; then
            SHA=$(gh api "repos/${{ github.repository }}/contents/price.json?ref=gh-pages" --jq .sha 2>/dev/null || echo "")
            ARGS=(-f message="chore: price tick [skip ci]" -f branch=gh-pages -f content="$(base64 -w0 price.json)")
            if [ -n "$SHA" ] && [ "$SHA" != "null" ]; then
              ARGS+=(-f sha="$SHA")
            fi
            gh api -X PUT "repos/${{ github.repository }}/contents/price.json" "${ARGS[@]}"
          fi
