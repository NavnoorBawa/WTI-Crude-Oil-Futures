name: Refresh frozen dashboard

# Re-freezes the live data into static JSON and redeploys the site to GitHub Pages.
# No running server required — the published site is pure static HTML/JS + a data.json
# snapshot. If a run fails (e.g. an upstream API is rate-limited), the previous good
# snapshot stays live and the next scheduled run retries.

on:
  schedule:
    # Hourly, every day (UTC). Fresh enough for a 1-week forecast and breaking-geo
    # detection, and ~2 NewsAPI calls/run stays well under the free tier's 100/day.
    # Edit this cron to change cadence (e.g. '0 */3 * * *' for every 3 hours).
    - cron: '0 * * * *'
  workflow_dispatch: {}        # allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:                     # rebuild the site when the app or pipeline changes
      - 'src/**'
      - 'backend/**'
      - 'freeze.py'
      - 'vite.config.js'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write              # peaceiris needs write access to push the gh-pages branch

concurrency:
  group: refresh-pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Freeze data snapshot -> public/data.json
        env:
          EAGER_ML_WARMUP: 'true'
          # Tolerate missing external APIs so a deploy never fails on a transient API outage;
          # the price/ML core still produces a valid snapshot.
          MIN_REQUIRED_EXTERNAL_SOURCES: '0'
          # Optional: add these as repository secrets to use your own keys instead of the
          # embedded fallbacks. The pipeline runs either way (code reads env first).
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          USDA_NASS_KEY: ${{ secrets.USDA_NASS_KEY }}
          NOAA_CDO_KEY: ${{ secrets.NOAA_CDO_KEY }}
        run: python freeze.py --out public

      - name: Check 1W signal and send alert on stance change
        env:
          # Add GMAIL_APP_PASSWORD as a GitHub Secret to enable email alerts.
          # Generate at: myaccount.google.com > Security > App passwords
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: navnoorquant@gmail.com
          ALERT_EMAIL: navnoorquant@gmail.com
        run: python backend/signal_alert.py --data public/data.json

      - name: Record + resolve live 1W track record
        run: python backend/live_record.py --data public/data.json

      - name: Persist signal state + live record to main branch
        run: |
          git config user.name "WTI Signal Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signal_state.json data/live_track_record.json
          if git diff --staged --quiet; then
            echo "Signal state unchanged — no commit"
          else
            git commit -m "chore: update 1W signal state [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install

      - name: Build static site (Vite copies public/data.json into dist/)
        env:
          VITE_STATIC_DATA: 'true'
          VITE_BASE_PATH: '/WTI-Crude-Oil-Futures/'
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true     # keep gh-pages as a single clean commit (no history bloat)
